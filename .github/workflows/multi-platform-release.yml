name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.4)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows Portable
            asset_name: VINYLflowplus-Windows.exe
            arch: x64
            is_intel: "False"
          - os: macos-14
            name: macOS App (Modern)
            asset_name: VINYLflowplus-macOS-Universal.zip
            macos_arch: ""
            macos_target: "11.0"
            is_intel: "False"
            arch: arm64
          - os: macos-13
            name: macOS App (Intel Legacy)
            asset_name: VINYLflowplus-macOS-Intel.zip
            macos_arch: "x86_64"
            macos_target: "10.15"
            is_intel: "True"
            arch: x64
          - os: ubuntu-22.04
            name: Linux AppImage
            asset_name: VINYLflowplus-Linux.AppImage
            skip_gui: "False"
            arch: x64
            is_intel: "False"
          - os: ubuntu-22.04
            name: Linux Lite (Browser Edition)
            asset_name: VINYLflowplus-Linux-Lite.AppImage
            skip_gui: "True"
            arch: x64
            is_intel: "False"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          if [ -z "$tag" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.+-]+)?$'; then
            echo "Release tag must look like vX.Y.Z (got: $tag)." >&2
            exit 1
          fi
          git fetch --tags --force
          if ! git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Release tag not found in repository: $tag" >&2
            exit 1
          fi
          git checkout "refs/tags/$tag"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.arch }}

      - name: Set macOS Deployment Target
        if: runner.os == 'macOS'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_target }}" >> $GITHUB_ENV
          if [ -n "${{ matrix.macos_arch }}" ]; then
            echo "MACOS_ARCH=${{ matrix.macos_arch }}" >> $GITHUB_ENV
          fi

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux' && matrix.skip_gui == 'False'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libglib2.0-0 libnss3 libfontconfig1 libx11-xcb1 libxcomposite1 libxdamage1 libxrender1 libxrandr2 libxtst6 libxss1 libgconf-2-4 libasound2 libatk1.0-0 libgtk-3-0 libcairo2-dev libgirepository1.0-dev pkg-config python3-dev gir1.2-gtk-3.0 gir1.2-webkit2-4.1 libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0

      - name: Install System Dependencies (Linux Lite)
        if: runner.os == 'Linux' && matrix.skip_gui == 'True'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install ffmpeg -y

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ "${{ matrix.is_intel }}" = "True" ]; then
            echo "Downloading Intel FFmpeg for Legacy build..."
            curl -L https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v6.1/ffmpeg-6.1-macos-64.zip -o ffmpeg.zip
            unzip -o ffmpeg.zip
            chmod +x ffmpeg
            # Put it in a local bin and add to PATH so PyInstaller finds this one first
            mkdir -p ./intel_ffmpeg
            mv ffmpeg ./intel_ffmpeg/
            echo "$(pwd)/intel_ffmpeg" >> $GITHUB_PATH
          else
            brew install ffmpeg
          fi

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Python dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PREFIX=""
          if [ "${{ matrix.is_intel }}" = "True" ]; then PREFIX="arch -x86_64 "; fi
          $PREFIX python -m pip install --upgrade pip
          if [ "${{ matrix.skip_gui }}" = "True" ]; then
            $PREFIX pip install -r requirements-lite.txt
          else
            $PREFIX pip install -r requirements.txt
          fi
          $PREFIX pip install pyinstaller

      - name: Build Application (One-File, Windows)
        if: runner.os == 'Windows'
        shell: powershell
        env:
          PYINSTALLER_ONEFILE: "True"
          SKIP_GUI: "False"
        run: pyinstaller --clean -y VINYLflowplus.spec

      - name: Build Application (One-File, Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          PYINSTALLER_ONEFILE: "True"
          SKIP_GUI: ${{ matrix.skip_gui }}
        run: |
          PREFIX=""
          if [ "${{ matrix.is_intel }}" = "True" ]; then PREFIX="arch -x86_64 "; fi
          $PREFIX pyinstaller --clean -y VINYLflowplus.spec

      - name: Rename Windows Executable
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Move-Item dist\VINYLflowplus.exe "${{ matrix.asset_name }}"

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../${{ matrix.asset_name }} VINYLflowplus.app

      - name: Package Linux (AppImage)
        if: runner.os == 'Linux'
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/VINYLflowplus AppDir/usr/bin/
          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/VINYLflowplus" "$@"
          EOF
          chmod +x AppDir/AppRun
          cat << 'EOF' > AppDir/VINYLflowplus.desktop
          [Desktop Entry]
          Type=Application
          Name=VINYLflowplus
          Exec=VINYLflowplus
          Icon=VINYLflowplus
          Categories=Audio;AudioVideo;
          EOF
          cp assets/VFplus.png AppDir/VINYLflowplus.png
          wget -c "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun AppDir ${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          tag_name: ${{ env.RELEASE_TAG }}
          name: VINYLflowplus ${{ env.RELEASE_TAG }}
          body: |
            # <img src="https://raw.githubusercontent.com/flarkflarkflark/VINYLflowplus/main/assets/vinylflowplus-logo.svg" height="40" vertical-align="middle" />

            Official release artifacts for `${{ env.RELEASE_TAG }}`.

            ---
            
            ### Download for your Platform:
            
            | Platform | File | Architecture |
            | :--- | :--- | :--- |
            | **Windows** | `VINYLflowplus-Windows.exe` | Portable x64 |
            | **macOS (Modern)** | `VINYLflowplus-macOS-Universal.zip` | ARM64 (M1/M2/M3) |
            | **macOS (Legacy)** | `VINYLflowplus-macOS-Intel.zip` | Intel (Catalina/OpenCore) |
            | **Linux** | `VINYLflowplus-Linux.AppImage` | Standard Desktop (x64) |
            | **Linux Lite** | `VINYLflowplus-Linux-Lite.AppImage` | Browser Edition (x64) |
            
            ---
            *Note: FFmpeg is bundled in all versions. No manual installation required.*
            *Data is stored in `~/.vinylflowplus` for maximum reliability.*
