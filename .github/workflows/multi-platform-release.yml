name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (optional, for manual runs)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows Portable
            asset_name: VINYLflowplus-Windows.exe
          - os: macos-12
            name: macOS App (Universal)
            asset_name: VINYLflowplus-macOS-Universal.zip
            macos_arch: universal2
            macos_target: "12.0"
          - os: macos-12
            name: macOS App (Intel Legacy)
            asset_name: VINYLflowplus-macOS-Intel.zip
            macos_arch: x86_64
            macos_target: "10.15"
          - os: ubuntu-22.04
            name: Linux AppImage
            asset_name: VINYLflowplus-Linux.AppImage
            skip_gui: "False"
          - os: ubuntu-22.04
            name: Linux Lite (Browser Edition)
            asset_name: VINYLflowplus-Linux-Lite.AppImage
            skip_gui: "True"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set macOS Deployment Target
        if: runner.os == 'macOS'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_target }}" >> $GITHUB_ENV
          echo "MACOS_ARCH=${{ matrix.macos_arch }}" >> $GITHUB_ENV

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux' && matrix.skip_gui == 'False'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libglib2.0-0 libnss3 libfontconfig1 libx11-xcb1 libxcomposite1 libxdamage1 libxrender1 libxrandr2 libxtst6 libxss1 libgconf-2-4 libasound2 libatk1.0-0 libgtk-3-0 libcairo2-dev libgirepository1.0-dev pkg-config python3-dev gir1.2-gtk-3.0 gir1.2-webkit2-4.1 libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0

      - name: Install System Dependencies (Linux Lite)
        if: runner.os == 'Linux' && matrix.skip_gui == 'True'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install ffmpeg -y

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Python dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.skip_gui }}" = "True" ]; then
            grep -vE "PyQt" requirements.txt > req_lite.txt
            pip install -r req_lite.txt
          else
            pip install -r requirements.txt
          fi
          pip install pyinstaller

      - name: Build Application (One-File)
        env:
          PYINSTALLER_ONEFILE: "True"
          SKIP_GUI: ${{ matrix.skip_gui }}
        run: pyinstaller --clean -y VINYLflowplus.spec

      - name: Rename Windows Executable
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Move-Item dist\VINYLflowplus.exe VINYLflowplus-Windows.exe

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../VINYLflowplus-macOS.zip VINYLflowplus.app

      - name: Package Linux (AppImage)
        if: runner.os == 'Linux'
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/VINYLflowplus AppDir/usr/bin/
          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/VINYLflowplus" "$@"
          EOF
          chmod +x AppDir/AppRun
          cat << 'EOF' > AppDir/VINYLflowplus.desktop
          [Desktop Entry]
          Type=Application
          Name=VINYLflowplus
          Exec=VINYLflowplus
          Icon=VINYLflowplus
          Categories=Audio;AudioVideo;
          EOF
          cp assets/VFplus.png AppDir/VINYLflowplus.png
          wget -c "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun AppDir ${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          tag_name: ${{ inputs.tag || github.ref_name }}
          body: |
            ### 📦 VINYLflowplus v1.0.2 - Official Stable Release
            
            This release marks the transition to a fully portable, "Click & Run" experience across all platforms.
            
            #### ✨ Key Improvements in v1.0.2:
            - **🚀 Linux Lite Autostart:** The Lite version now correctly opens your system browser (Firefox/Chrome) automatically by isolating itself from the AppImage environment.
            - **🌗 UI Refinements:** Improved header styling to match the brand website and fixed contrast issues in the Settings modal and Footer for Dark Mode.
            - **🏷️ Robust Tagging:** Enhanced metadata engine that forces vinyl track positions (A1, B2) directly from filenames as a final safety check.
            
            #### 🖥️ Available Packages:
            
            | Platform | File | Description |
            | :--- | :--- | :--- |
            | **🪟 Windows** | `VINYLflowplus-Windows.exe` | **Recommended for Windows.** Single-file executable. No install needed. Includes Python, FFmpeg, and native UI. |
            | **🍎 macOS** | `VINYLflowplus-macOS.zip` | **Recommended for macOS (Ventura+).** Portable `.app` bundle. Includes FFmpeg and native UI. |
            | **🐧 Linux** | `VINYLflowplus-Linux.AppImage` | **Full Desktop Experience.** Built-in Chromium-based window. Includes all dependencies. |
            | **🐧 Linux Lite** | `VINYLflowplus-Linux-Lite.AppImage` | **Fast & Lightweight.** (~100MB smaller). Opens the interface in your *own* browser (e.g. Firefox). Perfect for Arch Linux and advanced users. |
            
            ---
            *Note: FFmpeg is now bundled in all versions. Manual installation is no longer required.*
